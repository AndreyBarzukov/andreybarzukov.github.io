<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — LUXOMIX®</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
body { font-family:'Inter',system-ui,sans-serif; margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#0E2D17; color:#fff; padding:24px; }
.box { max-width:520px; text-align:center; }
.code { font-family:'Bebas Neue',Impact,sans-serif; font-size:160px; line-height:1; background:linear-gradient(120deg,#F5C518 0%,#F39200 50%,#D52B1E 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:16px; }
h1 { font-family:'Bebas Neue',Impact,sans-serif; font-size:36px; margin:0 0 16px; text-transform:uppercase; letter-spacing:1px; }
p { color:rgba(255,255,255,0.72); line-height:1.55; margin:0 0 28px; font-size:16px; }
a.btn { display:inline-flex; align-items:center; gap:10px; padding:14px 28px; background:#6980FF; color:#fff; border-radius:12px; text-decoration:none; font-family:'Bebas Neue',sans-serif; letter-spacing:1px; text-transform:uppercase; transition:background .15s; }
a.btn:hover { background:#4A60E0; }
</style>
</head>
<body>
<div class="box">
<div class="code">404</div>
<h1>Страница не найдена</h1>
<p>Адрес <code id="url" style="background:rgba(255,255,255,0.1); padding:2px 8px; border-radius:6px;"></code> не существует. Возможно, ссылка устарела или была удалена.</p>
<a class="btn" href="/">← Вернуться на главную</a>
</div>
<script>document.getElementById('url').textContent = location.pathname;</script>
</body>
</html>
