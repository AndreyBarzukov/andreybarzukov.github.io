<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пользовательское соглашение — LUXOMIX®</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
body { font-family:'Inter',system-ui,sans-serif; margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#F5F6F8; color:#1A1A1A; padding:24px; }
.box { max-width:560px; background:#fff; padding:48px 40px; border-radius:24px; box-shadow:0 24px 48px -24px rgba(14,45,23,0.18); text-align:center; }
.eyebrow { font-size:11px; text-transform:uppercase; letter-spacing:2px; color:#6980FF; font-weight:600; margin-bottom:16px; padding:6px 14px; border:1px solid rgba(105,128,255,.25); border-radius:999px; display:inline-block; background:rgba(105,128,255,.05); }
h1 { font-family:'Bebas Neue',Impact,sans-serif; font-size:48px; line-height:1; color:#0E2D17; margin:0 0 16px; text-transform:uppercase; letter-spacing:0.5px; }
p { color:#6B7280; line-height:1.55; margin:0 0 28px; font-size:16px; }
a.btn { display:inline-flex; align-items:center; gap:10px; padding:14px 28px; background:#6980FF; color:#fff; border-radius:12px; text-decoration:none; font-family:'Bebas Neue',sans-serif; letter-spacing:1px; text-transform:uppercase; transition:background .15s; }
a.btn:hover { background:#4A60E0; }
a.btn svg { width:16px; height:16px; }
</style>
</head>
<body>
<div class="box">
<span class="eyebrow">Раздел в работе</span>
<h1>Пользовательское соглашение</h1>
<p>Текст пользовательского соглашения. В прототипе это плейсхолдер.</p>
<a class="btn" href="/">← На главную <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a>
</div>
</body>
</html>
